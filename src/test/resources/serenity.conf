serenity {
    rest.default-base-url = "http://localhost:50001"
    logging = VERBOSE
    take.screenshots = FOR_FAILURES
    test.reports = target/site/serenity
    project.key = "TICKETING"
    capabilities {
        take.screenshots = FOR_FAILURES
        verbose.screenshots = true
    }
}

webdriver {
    driver = chrome
    capabilities {
        chrome {
            args = ["--no-sandbox", "--disable-dev-shm-usage"]
        }
    }
}